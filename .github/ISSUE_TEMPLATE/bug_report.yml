name: Reporte de Bug
description: Reporta un bug en vtex-snap
labels: ["bug"]
body:
  - type: input
    id: vtex-snap-version
    attributes:
      label: Versión de vtex-snap
      placeholder: "ej: 2.3.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Versión de Node.js
      placeholder: "ej: 20.11.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Sistema Operativo
      placeholder: "ej: macOS 14, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Una descripción clara y concisa del problema.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ejecute `vtex-snap ...`
        2. Seleccione ...
        3. Vea el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: ¿Qué esperabas que ocurriera?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / salida de error
      render: shell
